name: Chartink 5-Min Scanner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Fixes the Node 20 deprecation warning globally for this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    # Increased from 5 to 15 minutes to allow proxies time to retry
    timeout-minutes: 15 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Explicitly using Node 24

      - name: Install Dependencies
        run: npm install

      - name: Execute Scanner Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
        run: node index.js
