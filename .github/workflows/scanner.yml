name: Chartink 5-Min Scanner

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Prevents hanging tasks
    
    steps:
      # Updated to v4
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Updated to v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # You can optionally change this to '22' or '24' if you want the absolute latest runtime

      - name: Install Dependencies
        run: npm install

      - name: Execute Scanner Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }} # Optional
        run: node index.js
